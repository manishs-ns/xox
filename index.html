<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XOX Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .cell {
            width: 90px;
            height: 90px;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f1f1;
            cursor: pointer;
            border-radius: 10px;
        }

        .cell:hover {
            background: #ddd;
        }

        .btn-custom {
            background-color: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background-color: #5a67d8;
        }
    </style>
</head>

<body>

    <div class="game-card">
        <h3>❌⭕ Tic-Tac-Toe</h3>
        <p>Current Turn: <b id="turn">X</b></p>

        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>

        <p id="message" class="mt-3 fw-bold"></p>

        <button class="btn btn-custom w-100 mt-3" onclick="restartGame()">Restart</button>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const winningPatterns = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        function makeMove(index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            document.getElementsByClassName("cell")[index].innerText = currentPlayer;

            checkWinner();

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById("turn").innerText = currentPlayer;
        }

        function checkWinner() {
            for (let pattern of winningPatterns) {
                let [a, b, c] = pattern;

                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    document.getElementById("message").innerText = `🎉 Player ${board[a]} Wins!`;
                    gameActive = false;
                    return;
                }
            }

            if (!board.includes("")) {
                document.getElementById("message").innerText = "🤝 It's a Draw!";
                gameActive = false;
            }
        }

        function restartGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;

            document.getElementById("turn").innerText = "X";
            document.getElementById("message").innerText = "";

            let cells = document.getElementsByClassName("cell");
            for (let cell of cells) {
                cell.innerText = "";
            }
        }
    </script>

</body>

</html>
